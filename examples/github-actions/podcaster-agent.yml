# SAMPLE — inert while it lives here. GitHub only runs workflows under
# .github/workflows/, so this file does nothing in examples/. To activate, copy it
# to .github/workflows/ in your fork (see this folder's README). Kept out of
# .github/workflows/ on purpose so forking doesn't start a cron you didn't ask for.
name: Podcaster agent
on:
  schedule: [{ cron: "0 14 * * *" }]   # daily 14:00 UTC
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    env:
      OCDEVEL_API_KEY: ${{ secrets.OCDEVEL_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - run: ./setup.sh
      - run: npm i -g @anthropic-ai/claude-code
      # CLAUDE.md auto-loads as project memory. --dangerously-skip-permissions
      # is acceptable here because CI is unattended and the container is throwaway.
      - run: claude -p --dangerously-skip-permissions "See CLAUDE.md."
